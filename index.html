<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeilMed Warehouse Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📦</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--mono:'JetBrains Mono',monospace;--bg:#07090d;--surface:#0e1218;--card:#13171f;--border:#1c2230;--borderHi:#2a3348;--text:#dfe4ed;--dim:#8b95a8;--muted:#556070;--blue:#4a90e2;--blueDim:#1a3a6b;--green:#2ecf7a;--greenDim:#0d4a2e;--red:#e55656;--redDim:#5a1a1a;--amber:#e8a832;--purple:#9b7af0;--cyan:#36c5d6}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',-apple-system,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--borderHi);border-radius:3px}
.header{border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;background:var(--surface)}
.header h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-0.02em}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.btn-group{display:flex;gap:1px;background:var(--card);border-radius:8px;padding:2px;border:1px solid var(--border)}
.btn{padding:5px 12px;background:transparent;color:var(--muted);border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.btn.active{background:var(--blue);color:#fff}
.btn-upload{padding:5px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-clear{padding:5px 10px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:11px;cursor:pointer}
.tabs{border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;background:var(--surface)}
.tab{padding:11px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.tab.active{border-bottom-color:var(--blue);color:var(--text)}
.content{padding:20px;max-width:1400px;margin:0 auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.kpi{position:relative;overflow:hidden}
.kpi-icon{position:absolute;top:-8px;right:-4px;font-size:52px;opacity:0.05}
.kpi-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:800;color:var(--text);font-family:var(--mono);line-height:1}
.kpi-sub{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:11px}
.msg{padding:8px 24px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border)}
.msg.ok{background:var(--greenDim);color:var(--green)}
.msg.err{background:var(--redDim);color:var(--red)}
.footer{padding:14px 24px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--muted)}
.upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.upload-box{width:100%;max-width:500px;padding:56px 40px;border:2px dashed var(--borderHi);border-radius:16px;text-align:center;cursor:pointer;background:var(--surface);transition:all 0.2s}
.upload-box.drag{border-color:var(--blue);background:var(--blueDim)}
.upload-btn{display:inline-block;padding:10px 28px;background:var(--blue);color:#fff;border-radius:8px;font-weight:700;font-size:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 12px;color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;border-bottom:2px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--card);z-index:1}
td{padding:7px 12px;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--mono);font-size:12px}
tr:nth-child(even){background:rgba(255,255,255,0.015)}
.page-nav{display:flex;justify-content:center;gap:8px;padding:12px;align-items:center}
.page-btn{background:var(--border);border:none;color:var(--text);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.page-btn:disabled{opacity:0.3;cursor:default}
</style>
</head>

  {pages>1&&(<div className="page-nav"><button className="page-btn" onClick={()=>setPg(p=>Math.max(0,p-1))} disabled={pg===0}>{"\u2190"} Prev</button><span style={{color:"#556070",fontSize:11,fontFamily:"var(--mono)"}}>{pg+1}/{pages}</span><button className="page-btn" onClick={()=>setPg(p=>Math.min(pages-1,p+1))} disabled={pg>=pages-1}>Next {"\u2192"}</button></div>)}</div>);

  const prev=useMemo(()=>{for(let i=latIdx-1;i>=0;i--){if([COL.totalLPs,COL.total,COL.emptyBins].some(c=>c&&locData[i][c]!=null))return locData[i]}return{}},[locData,latIdx,COL]);
  const tc=(a,b)=>(a!=null&&b!=null&&b!==0)?((a-b)/Math.abs(b))*100:null;

  const chartData=useMemo(()=>locData.map(r=>{const d=new Date(r._date);return{dateLabel:!isNaN(d)?`${d.getMonth()+1}/${d.getDate()}`:r._date,totalLPs:g(r,COL.totalLPs),emptyBins:g(r,COL.emptyBins),occBins:g(r,COL.occBins),aisle:g(r,COL.aisle),inbound:g(r,COL.inbound),outWO:g(r,COL.outWO),outINT:g(r,COL.outINT),outUSA:g(r,COL.outUSA),prodUSA:g(r,COL.prodUSA),prodINT:g(r,COL.prodINT),net:g(r,COL.total),fullINTL:g(r,COL.fullINTL),fullUS:g(r,COL.fullUS),fullRM:g(r,COL.fullRM)}}),[locData,COL]);

  const latLP=g(latest,COL.totalLPs),prvLP=g(prev,COL.totalLPs);
  const latEmpty=g(latest,COL.emptyBins),prvEmpty=g(prev,COL.emptyBins);
  const latOcc=g(latest,COL.occBins),latTotBins=g(latest,COL.totalBins);
  const utilPct=(latOcc!=null&&latTotBins)?(latOcc/latTotBins*100):null;
  const latNet=g(latest,COL.total);
  const avgNet=useMemo(()=>{const vals=locData.map(r=>g(r,COL.total)).filter(x=>x!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null},[locData,COL.total]);

  const weeklyAgg=useMemo(()=>{const wks={};locData.forEach(r=>{const wk=r._week;if(wk==null)return;if(!wks[wk])wks[wk]={week:`W${wk}`,inbound:0,outbound:0};wks[wk].inbound+=(g(r,COL.inbound)||0);wks[wk].outbound+=Math.abs(g(r,COL.outWO)||0)+Math.abs(g(r,COL.outINT)||0)+Math.abs(g(r,COL.outUSA)||0)});return Object.values(wks)},[locData,COL]);

  const palletBreakdown=useMemo(()=>{const[palRow]=findLatest(locData,COL.fullINTL,COL.fullUS,COL.fullRM);return[{name:"Full INTL FG",value:g(palRow,COL.fullINTL)||0,color:"#4a90e2"},{name:"Part INTL FG",value:g(palRow,COL.partINTL)||0,color:"#6aacf0"},{name:"Full US FG",value:g(palRow,COL.fullUS)||0,color:"#2ecf7a"},{name:"Part US FG",value:g(palRow,COL.partUS)||0,color:"#5aeaa0"},{name:"Full RM",value:g(palRow,COL.fullRM)||0,color:"#e8a832"},{name:"Part RM",value:g(palRow,COL.partRM)||0,color:"#f0c060"},{name:"Other",value:g(palRow,COL.other)||0,color:"#9b7af0"}].filter(p=>p.value>0)},[locData,COL,findLatest]);

  const flowCols=[{key:"_date",label:"Date",align:"left",mono:false},{key:"_week",label:"Wk"},COL.outWO&&{key:COL.outWO,label:"Out WO",render:x=><span style={{color:x<0?"#e55656":"#dfe4ed"}}>{fmt(x)}</span>},COL.outINT&&{key:COL.outINT,label:"Out INT",render:x=><span style={{color:x<0?"#e55656":"#dfe4ed"}}>{fmt(x)}</span>},COL.outUSA&&{key:COL.outUSA,label:"Out USA",render:x=><span style={{color:x<0?"#e55656":"#dfe4ed"}}>{fmt(x)}</span>},COL.prodUSA&&{key:COL.prodUSA,label:"Prod USA",render:x=><span style={{color:x>0?"#2ecf7a":"#dfe4ed"}}>{fmt(x)}</span>},COL.prodINT&&{key:COL.prodINT,label:"Prod INT"},COL.inbound&&{key:COL.inbound,label:"Inbound",render:x=><span style={{color:x>0?"#2ecf7a":"#dfe4ed"}}>{fmt(x)}</span>},COL.total&&{key:COL.total,label:"Net",render:x=><span style={{color:x>0?"#2ecf7a":x<0?"#e55656":"#dfe4ed",fontWeight:700}}>{fmt(x)}</span>},COL.totalLPs&&{key:COL.totalLPs,label:"Total LPs"},COL.emptyBins&&{key:COL.emptyBins,label:"Empty"}].filter(Boolean);

  const binCols=[{key:"_date",label:"Date",align:"left",mono:false},COL.totalBins&&{key:COL.totalBins,label:"Total Bins"},COL.occBins&&{key:COL.occBins,label:"Occupied"},COL.emptyBins&&{key:COL.emptyBins,label:"Empty",render:x=><span style={{color:x!=null&&x<100?"#e55656":x!=null&&x<300?"#e8a832":"#2ecf7a"}}>{fmt(x)}</span>},COL.aisle&&{key:COL.aisle,label:"Aisle",render:x=><span style={{color:x>500?"#e55656":x>200?"#e8a832":"#dfe4ed"}}>{fmt(x)}</span>},COL.abv60&&{key:COL.abv60,label:'>60" Empty'},COL.blw60&&{key:COL.blw60,label:'<60" Empty'}].filter(Boolean);

  const palCols=[{key:"_date",label:"Date",align:"left",mono:false},COL.fullINTL&&{key:COL.fullINTL,label:"Full INTL FG"},COL.partINTL&&{key:COL.partINTL,label:"Part INTL"},COL.fullUS&&{key:COL.fullUS,label:"Full US FG"},COL.partUS&&{key:COL.partUS,label:"Part US"},COL.fullRM&&{key:COL.fullRM,label:"Full RM"},COL.partRM&&{key:COL.partRM,label:"Part RM"},COL.other&&{key:COL.other,label:"Other"}].filter(Boolean);

  const tabDefs=[{id:"overview",label:"Overview"},{id:"flow",label:"In / Out Flow"},{id:"bins",label:"Bin Utilization"},{id:"pallets",label:"Pallet Breakdown"},{id:"table",label:"Full Data"}];

  // Upload screen
  if(!loading&&data.length===0){
    return(<div className="upload-screen" onDrop={handleDrop} onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <img src={LOGO} alt="NeilMed" style={{height:48,marginBottom:12}} />
        <div style={{fontSize:30,fontWeight:800,letterSpacing:"-0.03em"}}>Warehouse Dashboard</div>
        <div style={{color:"#556070",fontSize:14,marginTop:4}}>CA-ONT Daily Report</div>
      </div>
      <div className={"upload-box"+(dragging?" drag":"")} onClick={()=>fileRef.current?.click()}>
        <div style={{fontSize:48,marginBottom:16,opacity:0.5}}>{"\uD83D\uDCC4"}</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{dragging?"Drop your CSV here":"Upload your daily CSV"}</div>
        <div style={{fontSize:13,color:"#556070",marginBottom:20}}>Drag & drop or click to browse</div>
        <div className="upload-btn">Choose File</div>
        <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={e=>processFile(e.target.files?.[0])} />
      </div>
      {msg&&<div className={"msg "+(msg.startsWith("ok")?"ok":"err")} style={{marginTop:16,padding:"10px 20px",borderRadius:8}}>{msg.slice(msg.indexOf(":")+1)}</div>}
    </div>);
  }

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#556070"}}>Loading...</div>;

  return(<div>
    {/* Header */}
    <div className="header">
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <img src={LOGO} alt="NeilMed" style={{height:32}} />
        <div><h1>Warehouse Dashboard</h1><div className="header-sub">{locations.join(" \u00B7 ")} \u00B7 {data.length} rows \u00B7 Showing: {latest._date||"\u2014"}</div></div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <div className="btn-group">{[["all","All"],["6m","6M"],["90d","90D"],["30d","30D"]].map(([v,l])=>(<button key={v} className={"btn"+(dateRange===v?" active":"")} onClick={()=>setDateRange(v)}>{l}</button>))}</div>
        <div className="btn-group">{locations.map(l=>(<button key={l} className={"btn"+(loc===l?" active":"")} onClick={()=>setLoc(l)} style={loc===l?{background:LC[l]||"#4a90e2"}:{}}>{l}</button>))}</div>
        <button className="btn-upload" onClick={()=>fileRef.current?.click()}>{"\u2191"} Upload New CSV</button>
        <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={e=>processFile(e.target.files?.[0])} />
        <button className="btn-clear" onClick={handleClear}>{"\u2715"}</button>
      </div>
    </div>

    {msg&&<div className={"msg "+(msg.startsWith("ok")?"ok":"err")}>{msg.slice(msg.indexOf(":")+1)}</div>}

    <div className="tabs">{tabDefs.map(t=>(<button key={t.id} className={"tab"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>))}</div>

    <div className="content">
    {tab==="overview"&&(<>
      <div className="grid4">
        <KPI label="Total LPs" value={fmt(latLP)} trend={tc(latLP,prvLP)} sub={"as of "+(latest._date||"\u2014")} icon={"\uD83D\uDCE6"} />
        <KPI label="Net Movement" value={fmt(latNet)} sub={"avg "+fmt(avgNet)+"/day"} icon={"\uD83D\uDCCA"} />
        <KPI label="Empty Bins" value={fmt(latEmpty)} trend={tc(latEmpty,prvEmpty)} sub="vs prev day" icon={"\uD83D\uDDD1"} />
        <KPI label="Bin Utilization" value={utilPct!=null?pf(utilPct):"\u2014"} sub={fmt(latOcc)+" / "+fmt(latTotBins)} icon={"\uD83D\uDCD0"} />
      </div>
      <div className="grid2">
        <Crd title="Total LPs Over Time" subtitle={loc}><ResponsiveContainer width="100%" height={250}><AreaChart data={chartData.filter(d=>d.totalLPs!=null)}><defs><linearGradient id="gLP" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={LC[loc]||"#4a90e2"} stopOpacity={0.35}/><stop offset="100%" stopColor={LC[loc]||"#4a90e2"} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Area type="monotone" dataKey="totalLPs" name="Total LPs" stroke={LC[loc]||"#4a90e2"} fill="url(#gLP)" strokeWidth={2} dot={false}/></AreaChart></ResponsiveContainer></Crd>
        <Crd title="Daily Net Movement" subtitle={loc}><ResponsiveContainer width="100%" height={250}><BarChart data={chartData.filter(d=>d.net!=null)}><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Bar dataKey="net" name="Net" radius={[2,2,0,0]}>{chartData.filter(d=>d.net!=null).map((d,i)=><Cell key={i} fill={d.net>=0?"#2ecf7a":"#e55656"}/>)}</Bar></BarChart></ResponsiveContainer></Crd>
      </div>
      <div className="grid2">
        <Crd title="Empty Bins Trend" subtitle={loc}><ResponsiveContainer width="100%" height={230}><AreaChart data={chartData.filter(d=>d.emptyBins!=null)}><defs><linearGradient id="gEB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#e8a832" stopOpacity={0.3}/><stop offset="100%" stopColor="#e8a832" stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Area type="monotone" dataKey="emptyBins" name="Empty Bins" stroke="#e8a832" fill="url(#gEB)" strokeWidth={2} dot={false}/></AreaChart></ResponsiveContainer></Crd>
        <Crd title="Weekly Inbound vs Outbound" subtitle={loc}><ResponsiveContainer width="100%" height={230}><BarChart data={weeklyAgg.slice(-12)}><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="week" tick={{fill:"#556070",fontSize:10}}/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Bar dataKey="inbound" name="Inbound" fill="#2ecf7a" radius={[2,2,0,0]}/><Bar dataKey="outbound" name="Outbound" fill="#e55656" radius={[2,2,0,0]}/><Legend wrapperStyle={{fontSize:11}}/></BarChart></ResponsiveContainer></Crd>
      </div>
    </>)}

    {tab==="flow"&&(<>
      <Crd title="Inbound \u00B7 Outbound \u00B7 Production" subtitle={loc} style={{marginBottom:14}}><ResponsiveContainer width="100%" height={300}><LineChart data={chartData}><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Legend wrapperStyle={{fontSize:11}}/>{COL.inbound&&<Line type="monotone" dataKey="inbound" name="Inbound" stroke="#2ecf7a" strokeWidth={2} dot={false}/>}{COL.outWO&&<Line type="monotone" dataKey="outWO" name="Out WO" stroke="#e55656" strokeWidth={2} dot={false}/>}{COL.outINT&&<Line type="monotone" dataKey="outINT" name="Out INT" stroke="#e8a832" strokeWidth={2} dot={false}/>}{COL.prodUSA&&<Line type="monotone" dataKey="prodUSA" name="Prod USA" stroke="#36c5d6" strokeWidth={1.5} dot={false} strokeDasharray="4 4"/>}{COL.prodINT&&<Line type="monotone" dataKey="prodINT" name="Prod INT" stroke="#9b7af0" strokeWidth={1.5} dot={false} strokeDasharray="4 4"/>}</LineChart></ResponsiveContainer></Crd>
      <Crd title="Movement Detail" subtitle={loc}><div style={{maxHeight:420,overflow:"auto"}}><SortTable data={[...locData].reverse()} columns={flowCols} perPage={15}/></div></Crd>
    </>)}

    {tab==="bins"&&(<>
      <div className="grid2" style={{marginBottom:14}}>
        <KPI label="Occupied Bins" value={fmt(latOcc)} sub={"of "+fmt(latTotBins)+" total"} icon={"\uD83C\uDFD7"} />
        <KPI label="Utilization" value={utilPct!=null?pf(utilPct):"\u2014"} sub={utilPct>95?"\u26A0 Critical":utilPct>90?"High":"Normal"} icon={"\uD83D\uDCD0"} />
      </div>
      <div className="grid2">
        <Crd title="Occupied vs Empty" subtitle={loc}><ResponsiveContainer width="100%" height={260}><AreaChart data={chartData.filter(d=>d.occBins!=null)}><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Legend wrapperStyle={{fontSize:11}}/><Area type="monotone" dataKey="occBins" name="Occupied" stroke="#e55656" fill="#5a1a1a" strokeWidth={2} dot={false}/><Area type="monotone" dataKey="emptyBins" name="Empty" stroke="#2ecf7a" fill="#0d4a2e" strokeWidth={2} dot={false}/></AreaChart></ResponsiveContainer></Crd>
        <Crd title="Pallets in Aisle" subtitle={loc}><ResponsiveContainer width="100%" height={260}><BarChart data={chartData.filter(d=>d.aisle!=null)}><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Bar dataKey="aisle" name="Aisle Pallets" fill="#e8a832" radius={[2,2,0,0]}/></BarChart></ResponsiveContainer></Crd>
      </div>
      <Crd title="Bin Detail" subtitle={loc} style={{marginTop:14}}><div style={{maxHeight:400,overflow:"auto"}}><SortTable data={[...locData].filter(r=>g(r,COL.totalBins)!=null).reverse()} columns={binCols} perPage={15}/></div></Crd>
    </>)}

    {tab==="pallets"&&(<>
      <div className="grid2">
        <Crd title="Current Pallet Mix" subtitle={loc+" \u2014 "+(latest._date||"")}><ResponsiveContainer width="100%" height={280}><PieChart><Pie data={palletBreakdown} cx="50%" cy="50%" innerRadius={55} outerRadius={105} paddingAngle={2} dataKey="value" label={({name,value})=>value>0?name+": "+fmt(value):""} labelLine={{stroke:"#556070"}}>{palletBreakdown.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip formatter={x=>fmt(x)}/></PieChart></ResponsiveContainer></Crd>
        <Crd title="FG & RM Trends" subtitle={loc}><ResponsiveContainer width="100%" height={280}><LineChart data={chartData.filter(d=>d.fullUS!=null||d.fullINTL!=null||d.fullRM!=null)}><CartesianGrid strokeDasharray="3 3" stroke="#1c2230"/><XAxis dataKey="dateLabel" tick={{fill:"#556070",fontSize:10}} interval="preserveStartEnd"/><YAxis tick={{fill:"#556070",fontSize:10}}/><Tooltip content={<CustomTooltip/>}/><Legend wrapperStyle={{fontSize:11}}/><Line type="monotone" dataKey="fullUS" name="Full US FG" stroke="#2ecf7a" strokeWidth={2} dot={false}/><Line type="monotone" dataKey="fullINTL" name="Full INTL FG" stroke="#4a90e2" strokeWidth={2} dot={false}/><Line type="monotone" dataKey="fullRM" name="Full RM" stroke="#e8a832" strokeWidth={2} dot={false}/></LineChart></ResponsiveContainer></Crd>
      </div>
      <Crd title="Pallet Detail" subtitle={loc} style={{marginTop:14}}><div style={{maxHeight:400,overflow:"auto"}}><SortTable data={[...locData].filter(r=>g(r,COL.fullRM)!=null).reverse()} columns={palCols} perPage={15}/></div></Crd>
    </>)}

    {tab==="table"&&(<Crd title="Full Data" subtitle={loc+" \u2014 "+locData.length+" records"}><div style={{maxHeight:600,overflow:"auto"}}><SortTable data={[...locData].reverse()} columns={flowCols} perPage={25}/></div></Crd>)}
    </div>

    <div className="footer">Upload updated CSV daily via "\u2191 Upload New CSV" \u00B7 Data saves in your browser between sessions</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
